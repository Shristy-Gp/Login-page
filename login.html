<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Medix Store</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <div class="main">
      <div class="container">
        <h2>Welcome to </h2>
          <h1>MediX Store</h1>
        
        <p>
          Your trusted pharmacy partner.<br />
          Quality medicines, reliable service, and care you can trust.
        </p>
      </div>
      <div class="login">
        <div class="content">
          <h2>Login</h2>
          <form action="">
            <div class="input">
              <input type="text" placeholder="username" required />
            </div>
            <div class="input">
              <input type="password" placeholder="password" required />
            </div>
            <div class="option">
              <label><input type="checkbox" required > Remember me</label>
              <a href="#">Forgot Password?</a>
            </div>
            <button type="submit" class="log">Login</button>
          </form>
          <div class="register">
           Don't have an account? <a onclick="show('content1')">Register</a> 
          </div>
        </div>

         <div class="content1 hidden">
          <h2>Register</h2>
          <form action="">
            <div class="input1">
              <input type="text" placeholder="username" required />
            </div>
             <div class="input1">
              <input type="email" placeholder="Email Id" required />
            </div>
            <div class="input1">
              <input type="password" placeholder="password" required />
            </div>
            <div class="input1">
              <input type="password" placeholder="Confirm password" required />
            </div>
            <div class="terms">
              <label><input type="checkbox" >I agree to the terms & conditions.</label>
            </div>
            <button type="submit" class="reg">Register</button>
          </form>
           <div class="register">
           Already have an account? <a onclick="show('content')">Login</a> 
          </div>
        
          </div>
      </div>
    </div>
    <script src="login.js"></script>
  </body>
</html>
